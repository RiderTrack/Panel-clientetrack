name: Build TrackVerse APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "⚠️ index.html no encontrado"
          [ -f clientetrack.html ] && cp clientetrack.html www/ || echo "⚠️ clientetrack.html no encontrado (ok)"
          [ -f clientes.html ] && cp clientes.html www/ || echo "⚠️ clientes.html no encontrado (ok)"
          [ -f pedidos.html ] && cp pedidos.html www/ || echo "⚠️ pedidos.html no encontrado (ok)"
          [ -f plantillas.html ] && cp plantillas.html www/ || echo "⚠️ plantillas.html no encontrado (ok)"
          [ -f configuracion.html ] && cp configuracion.html www/ || echo "⚠️ configuracion.html no encontrado (ok)"
          [ -f catalogo.html ] && cp catalogo.html www/ || echo "⚠️ catalogo.html no encontrado (ok)"
          [ -f estadisticas.html ] && cp estadisticas.html www/ || echo "⚠️ estadisticas.html no encontrado (ok)"
          [ -f campanas.html ] && cp campanas.html www/ || echo "⚠️ campanas.html no encontrado (ok)"
          [ -f automatizaciones.html ] && cp automatizaciones.html www/ || echo "⚠️ automatizaciones.html no encontrado (ok)"
          echo "✅ Web assets copiados (los que existan)"

      # ════════════════════════════════════════════════════════════════════
      # PASO CLAVE #1: Copiar bridges JS de Capacitor al www/
      # Sin estos <script> tags, window.Capacitor siempre será undefined
      # dentro de la APK, y ningún plugin nativo podrá ser invocado.
      # ════════════════════════════════════════════════════════════════════
      - name: Copy Capacitor JS bridges to www/
        run: |
          # Bridge principal de Capacitor (expone window.Capacitor + registerPlugin)
          cp node_modules/@capacitor/core/dist/capacitor.js www/ 2>/dev/null || echo "⚠️ capacitor.js no encontrado"
          # Plugin Filesystem (escritura de archivos nativa)
          cp node_modules/@capacitor/filesystem/dist/plugin.js www/filesystem.js 2>/dev/null || echo "⚠️ filesystem.js no encontrado"
          # Plugin Share (abre sheet nativo de compartir)
          cp node_modules/@capacitor/share/dist/plugin.js www/share.js 2>/dev/null || echo "⚠️ share.js no encontrado"
          ls -la www/*.js

      - name: Add Android Platform
        run: npx cap add android

      - name: Add Android Permissions
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />|' android/app/src/main/AndroidManifest.xml
          grep "uses-permission" android/app/src/main/AndroidManifest.xml

      # ════════════════════════════════════════════════════════════════════
      # PASO CLAVE #2: Resolver conflicto de BouncyCastle con Java 21
      # El error "Failed to create Jar file... bcprov-jdk18on-1.79.jar" ocurre
      # porque @capacitor/filesystem trae androidx.security:crypto que depende
      # de bcprov-jdk18on (requiere Java 18+), pero el toolchain de Gradle
      # con AGP 8 choca con esa versión. Forzamos bcprov-jdk15to18:1.70 que
      # SÍ compila con Java 21.
      # ════════════════════════════════════════════════════════════════════
      - name: Patch BouncyCastle conflict for Java 21
        run: |
          ROOT_GRADLE=android/build.gradle
          APP_GRADLE=android/app/build.gradle

          # Forzar versión compatible de BouncyCastle en el root build.gradle
          if ! grep -q "bcprov-jdk15to18" "$ROOT_GRADLE"; then
            awk '/buildscript \{/{print; print "    configurations.all { resolutionStrategy { force \"org.bouncycastle:bcprov-jdk15to18:1.70\" } }"; next}1' "$ROOT_GRADLE" > tmp && mv tmp "$ROOT_GRADLE"
          fi
          if ! grep -q "bcprov-jdk15to18" "$APP_GRADLE"; then
            awk '/dependencies \{/{print; print "    configurations.all { resolutionStrategy { force \"org.bouncycastle:bcprov-jdk15to18:1.70\" } }"; next}1' "$APP_GRADLE" > tmp && mv tmp "$APP_GRADLE"
          fi
          echo "=== android/build.gradle (primeras 30 líneas) ==="
          head -30 "$ROOT_GRADLE"
          echo "=== android/app/build.gradle (primeras 30 líneas) ==="
          head -30 "$APP_GRADLE"

      - name: Set App Name to TrackVerse
        run: |
          mkdir -p android/app/src/main/res/values
          STRINGS=android/app/src/main/res/values/strings.xml
          if [ -f "$STRINGS" ]; then
            sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">TrackVerse</string>|' "$STRINGS"
            grep -q 'name="app_name"' "$STRINGS" || \
              sed -i 's|</resources>|    <string name="app_name">TrackVerse</string>\n</resources>|' "$STRINGS"
            grep -q 'title_activity_main' "$STRINGS" || \
              sed -i 's|</resources>|    <string name="title_activity_main">TrackVerse</string>\n</resources>|' "$STRINGS"
          else
            cat > "$STRINGS" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">TrackVerse</string>
              <string name="title_activity_main">TrackVerse</string>
          </resources>
          EOF
          fi
          echo "✅ App name: TrackVerse"

      - name: Sync Web Assets
        run: npx cap sync android

      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Restore or generate keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "✅ Usando keystore guardado en Secrets"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          else
            echo "⚠️ No hay KEYSTORE_BASE64 — generando uno nuevo"
            keytool -genkeypair \
              -keystore release.keystore \
              -alias trackverse \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass trackverse123 \
              -keypass trackverse123 \
              -dname "CN=TrackVerse, OU=Rudy, O=MATE, L=Lima, S=Lima, C=PE"
            echo ""
            echo "══════════════════════════════════════════════"
            echo "COPIA ESTE BASE64 Y GUARDALO EN GITHUB SECRETS"
            echo "Nombre del secret: KEYSTORE_BASE64"
            echo "══════════════════════════════════════════════"
            base64 -w 0 release.keystore
            echo ""
            echo "══════════════════════════════════════════════"
          fi

      - name: Zipalign APK
        run: |
          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          $ZIPALIGN -v -p 4 android/app/build/outputs/apk/debug/app-debug.apk TrackVerse-aligned.apk

      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -1)
          $APKSIGNER sign \
            --ks release.keystore \
            --ks-key-alias trackverse \
            --ks-pass pass:trackverse123 \
            --key-pass pass:trackverse123 \
            --out TrackVerse.apk \
            TrackVerse-aligned.apk
          echo "✅ APK firmado correctamente"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: TrackVerse-APK
          path: TrackVerse.apk
          retention-days: 30

      - name: Show APK info
        run: du -sh TrackVerse.apk
