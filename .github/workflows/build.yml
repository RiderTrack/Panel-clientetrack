name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies
        run: npm install

      # El panel es la portada; los modulos van al lado
      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp clientetrack.html www/
          cp clientes.html www/
          cp pedidos.html www/
          cp plantillas.html www/
          cp configuracion.html www/
          cp catalogo.html www/

      - name: Add Android Platform
        run: npx cap add android

      - name: Add Android Permissions
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />|' android/app/src/main/AndroidManifest.xml
          grep "uses-permission" android/app/src/main/AndroidManifest.xml

      # ── NOMBRE de la app (lo que ves al instalar y en el launcher) ──
      - name: Set App Name to TrackVerse
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">TrackVerse</string>
          </resources>
          EOF
          # Asegurar que el manifest use el string
          if ! grep -q 'android:label' android/app/src/main/AndroidManifest.xml; then
            sed -i 's|<application|<application android:label="@string/app_name"|' android/app/src/main/AndroidManifest.xml
          fi
          echo "✅ App name: TrackVerse"

      - name: Sync Web Assets
        run: npx cap sync android

      # ── RECUPERAR KEYSTORE PERMANENTE desde secretos ──
      # Si NO configuraste los secretos KEYSTORE_BASE64/KEYSTORE_PASSWORD/KEY_ALIAS,
      # este paso se salta y compila debug normal (con firma efímera = hay que desinstalar).
      # Cuando SÍ los configures, firma con tu keystore permanente = actualiza sin desinstalar.
      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/trackverse.keystore
          ls -la android/trackverse.keystore
          echo "✅ Keystore decodificado"

      - name: Configure Signing with trackverse keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: android
        run: |
          # Agregar signingConfig.trackverse al build.gradle
          sed -i '/signingConfigs {/,/}/c\
              signingConfigs {\
                  trackverse {\
                      storeFile file("../../trackverse.keystore")\
                      storePassword "${{ secrets.KEYSTORE_PASSWORD }}"\
                      keyAlias "${{ secrets.KEY_ALIAS }}"\
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD }}"\
                  }\
              }' app/build.gradle
          # Usar el signingConfig en debug Y release (misma firma siempre)
          sed -i 's|signingConfig signingConfigs.debug|signingConfig signingConfigs.trackverse|g' app/build.gradle
          sed -i '/buildTypes {/,/debug {/s/debug {/debug {\n            signingConfig signingConfigs.trackverse/' app/build.gradle
          echo "✅ Firma configurada con keystore trackverse"

      # ── BUILD APK (firmado si hay keystore, debug si no) ──
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          if [ -f trackverse.keystore ]; then
            echo "🔐 Compilando APK firmado con keystore permanente (actualiza sin desinstalar)"
            ./gradlew assembleRelease
            # Copiar con nombre bonito
            cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/TrackVerse.apk
          else
            echo "⚠️  Sin keystore configurado. Compilando debug (habrá que desinstalar primero)"
            ./gradlew assembleDebug
            cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/TrackVerse.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TrackVerse-APK
          path: android/app/build/outputs/apk/**/TrackVerse.apk
