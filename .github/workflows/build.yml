name: Build TrackVerse APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # CLAVE: esto nos da zipalign y apksigner (firma fuera de Gradle)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/
          cp clientetrack.html www/
          cp clientes.html www/
          cp pedidos.html www/
          cp plantillas.html www/
          cp configuracion.html www/
          cp catalogo.html www/

      - name: Add Android Platform
        run: npx cap add android

      - name: Add Android Permissions
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.CAMERA" />|' android/app/src/main/AndroidManifest.xml
          grep "uses-permission" android/app/src/main/AndroidManifest.xml

      - name: Set App Name to TrackVerse
        run: |
          mkdir -p android/app/src/main/res/values
          STRINGS=android/app/src/main/res/values/strings.xml
          if [ -f "$STRINGS" ]; then
            sed -i 's|<string name="app_name">[^<]*</string>|<string name="app_name">TrackVerse</string>|' "$STRINGS"
            grep -q 'name="app_name"' "$STRINGS" || \
              sed -i 's|</resources>|    <string name="app_name">TrackVerse</string>\n</resources>|' "$STRINGS"
            grep -q 'title_activity_main' "$STRINGS" || \
              sed -i 's|</resources>|    <string name="title_activity_main">TrackVerse</string>\n</resources>|' "$STRINGS"
          else
            cat > "$STRINGS" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">TrackVerse</string>
              <string name="title_activity_main">TrackVerse</string>
          </resources>
          EOF
          fi
          echo "✅ App name: TrackVerse"

      - name: Sync Web Assets
        run: npx cap sync android

      - name: Set Gradle permissions
        run: chmod +x android/gradlew

      # ── Compila un APK normal (sin firma de release aun) ──
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      # ── Restaurar (o crear la primera vez) el keystore permanente ──
      - name: Restore or generate keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "✅ Usando keystore guardado en Secrets"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          else
            echo "⚠️ No hay KEYSTORE_BASE64 — generando uno nuevo (guardalo como Secret despues)"
            keytool -genkeypair \
              -keystore release.keystore \
              -alias trackverse \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass trackverse123 \
              -keypass trackverse123 \
              -dname "CN=TrackVerse, OU=Rudy, O=MATE, L=Lima, S=Lima, C=PE"
            echo ""
            echo "══════════════════════════════════════════════"
            echo "COPIA ESTE BASE64 Y GUARDALO EN GITHUB SECRETS"
            echo "══════════════════════════════════════════════"
            base64 -w 0 release.keystore
            echo ""
          fi

      # ── Alinear el APK (requisito antes de firmar) ──
      - name: Zipalign APK
        run: |
          ZIPALIGN=$(find $ANDROID_SDK_ROOT -name "zipalign" | head -1)
          $ZIPALIGN -v -p 4 android/app/build/outputs/apk/debug/app-debug.apk TrackVerse-aligned.apk

      # ── Firmar con el keystore permanente (sin tocar build.gradle) ──
      - name: Sign APK
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT -name "apksigner" | head -1)
          $APKSIGNER sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --out TrackVerse.apk \
            TrackVerse-aligned.apk
          echo "✅ APK firmado correctamente"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: TrackVerse-APK
          path: TrackVerse.apk
          retention-days: 30

      - name: Show APK info
        run: du -sh TrackVerse.apk
