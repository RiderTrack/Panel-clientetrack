name: Generar Keystore TrackVerse

# Workflow UNA SOLA VEZ: genera el keystore permanente de TrackVerse
# y lo sube como artefacto para descargar.
# Después de descargarlo, lo subes como secreto KEYSTORE_BASE64
# y este workflow ya no se vuelve a correr.

on:
  workflow_dispatch:  # solo se corre manualmente

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Generar keystore permanente
        run: |
          keytool -genkeypair \
            -keystore trackverse.keystore \
            -alias trackverse \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -storepass trackverse123 \
            -keypass trackverse123 \
            -dname "CN=TrackVerse, OU=Dev, O=RudyAlen, L=Lima, ST=Lima, C=PE"

      - name: Mostrar SHA1 (anótalo para Firebase y Spotify)
        run: |
          echo "============================================"
          echo "🔍 SHA1 de tu keystore TrackVerse:"
          echo "============================================"
          keytool -list -v -keystore trackverse.keystore \
            -storepass trackverse123 | grep -E "SHA1|SHA256"
          echo "============================================"
          echo "📝 Copia este SHA1 en Firebase Console y Spotify Dashboard"
          echo "============================================"

      - name: Convertir a base64 para GitHub Secrets
        run: |
          base64 -w 0 trackverse.keystore > keystore-base64.txt
          echo "✅ Keystore generado. Tamaño:"
          ls -la trackverse.keystore

      - name: Subir keystore (descarga y guarda como backup)
        uses: actions/upload-artifact@v4
        with:
          name: TrackVerse-Keystore
          path: |
            trackverse.keystore
            keystore-base64.txt
          retention-days: 90
