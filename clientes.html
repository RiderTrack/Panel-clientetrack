<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackVerse | Clientes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  :root{
    --bg:#F4F7FE; --card:#FFFFFF; --border:#E2E8F0;
    --blue:#0052FF; --purple:#7C3AED; --green:#10B981; --amber:#F59E0B;
    --text:#0F172A; --muted:#64748B;
    --radius:20px; --shadow:0 4px 16px rgba(15,23,42,0.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',sans-serif; line-height:1.5;
    min-height:100vh; min-height:100dvh;
  }

  /* ===== Header ===== */
  .top{
    position:sticky; top:0; z-index:50;
    background:rgba(244,247,254,0.92); backdrop-filter:blur(10px);
    padding:16px 16px 10px; border-bottom:1px solid var(--border);
  }
  .top h1{margin:0 0 2px; font-size:1.35rem; font-weight:800; letter-spacing:-0.5px; display:flex; align-items:center; gap:10px;}
  .top h1 i{color:var(--blue); font-size:1.1rem;}
  .contador{font-size:0.78rem; color:var(--muted); font-weight:500;}

  .search-wrap{position:relative; margin-top:12px;}
  .search-wrap i{position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.85rem;}
  #buscador{
    width:100%; background:var(--card); border:1px solid var(--border); border-radius:14px;
    padding:12px 14px 12px 38px; font-size:0.9rem; font-family:inherit; outline:none; color:var(--text);
  }
  #buscador:focus{border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,82,255,0.08);}

  .filtros{display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;}
  .filtros::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0; background:var(--card); border:1px solid var(--border); border-radius:999px;
    padding:7px 16px; font-size:0.78rem; font-weight:600; color:var(--muted); cursor:pointer;
    display:flex; align-items:center; gap:6px;
  }
  .chip.activo{background:var(--text); border-color:var(--text); color:#fff;}
  .chip .n{background:rgba(0,0,0,0.08); border-radius:8px; padding:1px 7px; font-size:0.68rem;}
  .chip.activo .n{background:rgba(255,255,255,0.2);}

  /* ===== Lista ===== */
  main{padding:14px 16px 90px; max-width:760px; margin:0 auto;}
  .cliente{
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    padding:14px; display:flex; align-items:center; gap:13px; margin-bottom:10px;
    cursor:pointer; box-shadow:var(--shadow); transition:transform .12s;
  }
  .cliente:active{transform:scale(0.985);}
  .avatar{
    width:48px; height:48px; border-radius:16px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:800; font-size:1.05rem;
  }
  .cli-info{flex:1; min-width:0;}
  .cli-nombre{font-weight:700; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .cli-sub{font-size:0.76rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px;}
  .cli-sub i{font-size:0.65rem; margin-right:3px;}
  .badge{flex-shrink:0; font-size:0.62rem; font-weight:800; padding:4px 10px; border-radius:8px; text-transform:uppercase; letter-spacing:0.4px;}
  .badge.hoy{background:rgba(16,185,129,0.12); color:var(--green);}
  .badge.registrado{background:rgba(0,82,255,0.1); color:var(--blue);}
  .badge.nuevo{background:rgba(245,158,11,0.12); color:#D97706;}

  .vacio{text-align:center; color:var(--muted); padding:60px 20px; font-size:0.9rem;}
  .vacio i{font-size:2.4rem; display:block; margin-bottom:12px; opacity:0.4;}

  /* ===== Ficha (modal deslizante) ===== */
  .modal-back{
    position:fixed; inset:0; background:rgba(15,23,42,0.45); backdrop-filter:blur(3px);
    z-index:200; display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .modal-back.show{opacity:1; pointer-events:auto;}
  .ficha{
    background:var(--card); border-radius:26px 26px 0 0; width:100%; max-width:560px;
    padding:20px 20px 32px; max-height:86vh; max-height:86dvh; overflow-y:auto;
    transform:translateY(40px); transition:transform .28s cubic-bezier(.3,1.2,.5,1);
  }
  .modal-back.show .ficha{transform:translateY(0);}
  .grab{width:44px; height:4px; border-radius:4px; background:var(--border); margin:0 auto 18px;}
  .ficha-head{display:flex; align-items:center; gap:14px; margin-bottom:6px;}
  .ficha-head .avatar{width:58px; height:58px; border-radius:18px; font-size:1.3rem;}
  .ficha-head h2{margin:0; font-size:1.2rem; letter-spacing:-0.3px;}
  .ficha-tel{font-size:0.82rem; color:var(--muted); font-weight:500;}

  .datos{margin-top:18px; display:flex; flex-direction:column; gap:2px;}
  .dato{
    display:flex; align-items:flex-start; gap:12px; padding:11px 4px;
    border-bottom:1px solid #F1F5F9; font-size:0.88rem;
  }
  .dato:last-child{border-bottom:none;}
  .dato i{width:20px; text-align:center; color:var(--blue); margin-top:2px; font-size:0.85rem;}
  .dato .k{font-size:0.68rem; text-transform:uppercase; letter-spacing:0.5px; color:var(--muted); font-weight:700; display:block;}
  .dato .v{font-weight:600;}
  .dato .v.monto{color:var(--green); font-weight:800; font-size:1rem;}

  .acciones{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-top:20px;}
  .accion{
    border:none; border-radius:16px; padding:14px 8px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    font-family:inherit; font-size:0.72rem; font-weight:700; color:#fff;
    text-decoration:none; transition:filter .15s;
  }
  .accion:active{filter:brightness(1.15); transform:scale(0.97);}
  .accion i{font-size:1.15rem;}
  .accion.wa{background:linear-gradient(135deg,#10B981,#059669);}
  .accion.tel{background:linear-gradient(135deg,#0052FF,#3B82F6);}
  .accion.mapa{background:linear-gradient(135deg,#7C3AED,#A78BFA);}

  /* ===== Escritorio — al final (regla de oro #3) ===== */
  @media (min-width: 768px){
    main{padding-top:20px;}
    .lista-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
    .cliente{margin-bottom:0;}
    .modal-back{align-items:center;}
    .ficha{border-radius:26px; max-height:80vh;}
  }
</style>
</head>
<body>

  <div class="top">
    <h1><i class="fa-solid fa-users"></i> Clientes <span class="contador" id="contador"></span></h1>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="buscador" type="search" placeholder="Buscar por nombre, teléfono o distrito..." autocomplete="off">
    </div>
    <div class="filtros">
      <div class="chip activo" data-f="todos" onclick="setFiltro('todos', this)">Todos <span class="n" id="n-todos">0</span></div>
      <div class="chip" data-f="hoy" onclick="setFiltro('hoy', this)">🚚 En ruta hoy <span class="n" id="n-hoy">0</span></div>
      <div class="chip" data-f="registrados" onclick="setFiltro('registrados', this)">📋 Registrados <span class="n" id="n-registrados">0</span></div>
    </div>
  </div>

  <main>
    <div id="lista" class="lista-grid"></div>
    <div class="vacio" id="vacio" style="display:none;"><i class="fa-solid fa-user-slash"></i>Sin resultados</div>
  </main>

  <!-- Ficha del cliente -->
  <div class="modal-back" id="modalBack" onclick="if(event.target===this)cerrarFicha()">
    <div class="ficha" id="fichaBody"></div>
  </div>

<script>
// ===== FIREBASE (mismo proyecto RiderTrack) =====
var firebaseConfig = {
  apiKey: "AIzaSyAzDl7gaS40JoXt9OoCPzG9FyaVPz_O34I",
  authDomain: "ridertrack-93c8a.firebaseapp.com",
  projectId: "ridertrack-93c8a",
  storageBucket: "ridertrack-93c8a.firebasestorage.app",
  messagingSenderId: "851606828420",
  appId: "1:851606828420:web:873a892a091394693e59d1"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var UID_BOT = 'K8wx9X5GGOfindI1RGtIIQN3UGr1';

// ===== Normalización de teléfono (regla de oro #6: idéntica al bot) =====
function normTel(t){
  t = String(t || '').replace(/\D/g, '');
  if(t.startsWith('51') && t.length > 9) t = t.slice(2);
  return t;
}

// ===== Avatares con color único por nombre =====
var PALETA = [
  ['#F472B6','#A78BFA'], ['#60A5FA','#34D399'], ['#FBBF24','#F87171'],
  ['#818CF8','#38BDF8'], ['#34D399','#0EA5E9'], ['#FB923C','#F43F5E'],
  ['#A78BFA','#0052FF'], ['#2DD4BF','#818CF8'], ['#F87171','#FBBF24']
];
function colorDe(nombre){
  var h = 0;
  for(var i=0; i<nombre.length; i++){ h = (h * 31 + nombre.charCodeAt(i)) >>> 0; }
  var p = PALETA[h % PALETA.length];
  return 'linear-gradient(135deg,' + p[0] + ',' + p[1] + ')';
}
function inicialesDe(nombre){
  var partes = String(nombre || '?').trim().split(/\s+/);
  var ini = partes[0].charAt(0) + (partes[1] ? partes[1].charAt(0) : '');
  return ini.toUpperCase();
}
function escapeHtml(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== Estado =====
var clientes = {};     // clave: tel normalizado
var filtroActual = 'todos';
var UNA_SEMANA = 7 * 24 * 60 * 60 * 1000;

// ===== Fuente 1: ruta_activa (clientes de HOY, de RiderTrack) =====
db.collection('ruta_activa').doc(UID_BOT).onSnapshot(function(doc){
  // limpiar marca "hoy" previa y re-aplicar
  Object.keys(clientes).forEach(function(k){ clientes[k].enRutaHoy = false; });
  if(doc.exists){
    var lista = doc.data().clientes || [];
    lista.forEach(function(c){
      var tel = normTel(c.cel);
      if(!tel) return;
      if(!clientes[tel]) clientes[tel] = { tel: tel };
      var cli = clientes[tel];
      cli.nombre = c.nombre || cli.nombre || 'Cliente';
      cli.prod = c.prod || cli.prod || '';
      cli.cobrar = c.cobrar || cli.cobrar || '';
      cli.dir = c.dir || cli.dir || '';
      cli.dist = c.dist || cli.dist || '';
      cli.enRutaHoy = true;
    });
  }
  render();
}, function(e){ console.warn('ruta_activa:', e.message); });

// ===== Fuente 2: clientes_registrados (histórico del chat) =====
db.collection('clientes_registrados').onSnapshot(function(snap){
  snap.forEach(function(d){
    var c = d.data();
    var tel = normTel(c.telefono || d.id);
    if(!tel) return;
    if(!clientes[tel]) clientes[tel] = { tel: tel, enRutaHoy: false };
    var cli = clientes[tel];
    if(!cli.nombre || cli.nombre === 'Cliente') cli.nombre = c.nombre || 'Cliente';
    if(!cli.prod) cli.prod = c.prod || '';
    if(!cli.cobrar) cli.cobrar = c.cobrar || '';
    if(!cli.dir) cli.dir = c.dir || '';
    if(!cli.dist) cli.dist = c.dist || '';
    cli.registrado = true;
    cli.registradoEn = c.timestamp || c.creado || 0;
  });
  render();
}, function(e){ console.warn('clientes_registrados:', e.message); });

// ===== Badge según estado =====
function badgeDe(c){
  if(c.enRutaHoy) return '<span class="badge hoy">Hoy</span>';
  if(c.registrado && c.registradoEn && (Date.now() - c.registradoEn) < UNA_SEMANA) return '<span class="badge nuevo">Nuevo</span>';
  if(c.registrado) return '<span class="badge registrado">Registrado</span>';
  return '<span class="badge registrado">Registrado</span>';
}

// ===== Render de la lista =====
function render(){
  var q = (document.getElementById('buscador').value || '').toLowerCase().trim();
  var arr = Object.keys(clientes).map(function(k){ return clientes[k]; });

  // contadores de filtros
  document.getElementById('n-todos').textContent = arr.length;
  document.getElementById('n-hoy').textContent = arr.filter(function(c){ return c.enRutaHoy; }).length;
  document.getElementById('n-registrados').textContent = arr.filter(function(c){ return c.registrado; }).length;

  // filtro
  if(filtroActual === 'hoy') arr = arr.filter(function(c){ return c.enRutaHoy; });
  if(filtroActual === 'registrados') arr = arr.filter(function(c){ return c.registrado; });

  // búsqueda: nombre, teléfono o distrito
  if(q){
    arr = arr.filter(function(c){
      return (c.nombre || '').toLowerCase().indexOf(q) !== -1
          || (c.tel || '').indexOf(q.replace(/\D/g,'')) !== -1 && q.replace(/\D/g,'').length > 0
          || (c.dist || '').toLowerCase().indexOf(q) !== -1;
    });
  }

  // orden: en ruta primero, luego alfabético
  arr.sort(function(a,b){
    if(a.enRutaHoy !== b.enRutaHoy) return a.enRutaHoy ? -1 : 1;
    return (a.nombre || '').localeCompare(b.nombre || '');
  });

  document.getElementById('contador').textContent = '· ' + arr.length;
  var lista = document.getElementById('lista');
  document.getElementById('vacio').style.display = arr.length ? 'none' : 'block';

  var h = '';
  arr.forEach(function(c){
    var sub = [];
    if(c.dist) sub.push('<i class="fa-solid fa-location-dot"></i>' + escapeHtml(c.dist));
    if(c.prod) sub.push('<i class="fa-solid fa-box"></i>' + escapeHtml(c.prod));
    h += '<div class="cliente" onclick="abrirFicha(\'' + c.tel + '\')">';
    h += '<div class="avatar" style="background:' + colorDe(c.nombre || c.tel) + '">' + inicialesDe(c.nombre) + '</div>';
    h += '<div class="cli-info"><div class="cli-nombre">' + escapeHtml(c.nombre || 'Cliente') + '</div>';
    h += '<div class="cli-sub">' + (sub.join(' &nbsp; ') || '+51 ' + c.tel) + '</div></div>';
    h += badgeDe(c);
    h += '</div>';
  });
  lista.innerHTML = h;
}

// ===== Filtros y búsqueda =====
function setFiltro(f, el){
  filtroActual = f;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('activo'); });
  el.classList.add('activo');
  render();
}
document.getElementById('buscador').addEventListener('input', render);

// ===== Ficha del cliente =====
function abrirFicha(tel){
  var c = clientes[tel];
  if(!c) return;
  var mapaQuery = encodeURIComponent(((c.dir || '') + ' ' + (c.dist || '') + ' Lima Peru').trim());
  var h = '<div class="grab"></div>';
  h += '<div class="ficha-head">';
  h += '<div class="avatar" style="background:' + colorDe(c.nombre || tel) + '">' + inicialesDe(c.nombre) + '</div>';
  h += '<div><h2>' + escapeHtml(c.nombre || 'Cliente') + '</h2><div class="ficha-tel">+51 ' + tel + ' &nbsp;' + badgeDe(c) + '</div></div>';
  h += '</div>';
  h += '<div class="datos">';
  if(c.prod)   h += '<div class="dato"><i class="fa-solid fa-box"></i><div><span class="k">Producto</span><span class="v">' + escapeHtml(c.prod) + '</span></div></div>';
  if(c.cobrar) h += '<div class="dato"><i class="fa-solid fa-money-bill-wave"></i><div><span class="k">Monto a cobrar</span><span class="v monto">S/ ' + escapeHtml(String(c.cobrar).replace(/^S\/\s*/i,'')) + '</span></div></div>';
  if(c.dir)    h += '<div class="dato"><i class="fa-solid fa-house"></i><div><span class="k">Dirección</span><span class="v">' + escapeHtml(c.dir) + '</span></div></div>';
  if(c.dist)   h += '<div class="dato"><i class="fa-solid fa-location-dot"></i><div><span class="k">Distrito</span><span class="v">' + escapeHtml(c.dist) + '</span></div></div>';
  if(!c.prod && !c.dir && !c.dist) h += '<div class="dato"><i class="fa-solid fa-circle-info"></i><div><span class="v" style="color:var(--muted);font-weight:500;">Sin datos de entrega — cliente del chat</span></div></div>';
  h += '</div>';
  h += '<div class="acciones">';
  h += '<a class="accion wa" href="https://wa.me/51' + tel + '" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i>WhatsApp</a>';
  h += '<a class="accion tel" href="tel:+51' + tel + '"><i class="fa-solid fa-phone"></i>Llamar</a>';
  h += '<a class="accion mapa" href="https://www.google.com/maps/search/?api=1&query=' + mapaQuery + '" target="_blank" rel="noopener"><i class="fa-solid fa-map-location-dot"></i>Mapa</a>';
  h += '</div>';
  document.getElementById('fichaBody').innerHTML = h;
  document.getElementById('modalBack').classList.add('show');
}
function cerrarFicha(){
  document.getElementById('modalBack').classList.remove('show');
}
</script>
</body>
</html>
